<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>SOUS COUVERTURE — Dossier confidentiel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0E141B;
    --panel:#161F2B;
    --panel-2:#1D2836;
    --paper:#EDE6D3;
    --paper-line:#C9BFA0;
    --red:#9C2B22;
    --red-bright:#C1443A;
    --teal:#3E9C8F;
    --text:#E7E2D3;
    --muted:#7C8798;
    --line:#2A3646;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--ink);color:var(--text);font-family:'IBM Plex Sans',sans-serif;min-height:100%;}
  body{
    background-image:
      repeating-linear-gradient(135deg, rgba(255,255,255,0.015) 0 2px, transparent 2px 40px);
  }
  #app{max-width:520px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;padding:0 0 40px;}

  .eyebrow{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);
  }
  .masthead{
    padding:28px 22px 18px;border-bottom:1px solid var(--line);position:relative;overflow:hidden;
  }
  .masthead::after{
    content:'CONFIDENTIEL';position:absolute;right:-40px;top:8px;font-family:'Special Elite',monospace;
    font-size:13px;letter-spacing:.3em;color:var(--red);opacity:.28;transform:rotate(8deg);
    border:2px solid var(--red);padding:4px 10px;
  }
  .title{
    font-family:'Special Elite',monospace;font-size:28px;letter-spacing:.06em;margin:6px 0 2px;color:var(--text);
  }
  .subtitle{color:var(--muted);font-size:13px;margin:0;}

  .content{flex:1;padding:20px 22px;}
  section.block{margin-bottom:26px;}
  .block-title{
    font-family:'Special Elite',monospace;font-size:15px;letter-spacing:.05em;color:var(--text);
    margin:0 0 4px;
  }
  .block-desc{color:var(--muted);font-size:12.5px;margin:0 0 12px;line-height:1.5;}

  .stepper{display:flex;align-items:center;gap:14px;}
  .stepper button{
    width:44px;height:44px;border-radius:8px;border:1px solid var(--line);background:var(--panel);
    color:var(--text);font-size:20px;font-family:'IBM Plex Mono',monospace;
  }
  .stepper .count{
    font-family:'IBM Plex Mono',monospace;font-size:26px;min-width:48px;text-align:center;
  }

  .name-list{display:flex;flex-direction:column;gap:8px;margin-top:10px;}
  .name-row{display:flex;align-items:center;gap:10px;}
  .name-row .idx{
    font-family:'IBM Plex Mono',monospace;color:var(--muted);font-size:12px;width:22px;text-align:right;
  }
  input[type="text"]{
    flex:1;background:var(--panel);border:1px solid var(--line);color:var(--text);
    padding:11px 12px;border-radius:6px;font-family:'IBM Plex Sans',sans-serif;font-size:14.5px;
  }
  input[type="text"]:focus{outline:none;border-color:var(--teal);}

  .toggle-row{
    display:flex;align-items:flex-start;gap:12px;padding:13px 0;border-bottom:1px solid var(--line);
  }
  .toggle-row:last-child{border-bottom:none;}
  .switch{
    position:relative;width:46px;height:26px;flex:0 0 auto;border-radius:14px;background:var(--panel-2);
    border:1px solid var(--line);cursor:pointer;margin-top:2px;
  }
  .switch.on{background:var(--teal);border-color:var(--teal);}
  .switch::after{
    content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;
    background:#0E141B;transition:left .15s ease;
  }
  .switch.on::after{left:22px;background:#0E141B;}
  .toggle-text .name{font-size:14.5px;font-weight:600;color:var(--text);}
  .toggle-text .desc{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.4;}
  .stepper-inline{display:flex;align-items:center;gap:10px;margin-top:4px;}
  .stepper-inline button{
    width:30px;height:30px;border-radius:6px;border:1px solid var(--line);background:var(--panel-2);color:var(--text);font-family:'IBM Plex Mono',monospace;
  }
  .stepper-inline .n{font-family:'IBM Plex Mono',monospace;font-size:16px;min-width:20px;text-align:center;}

  .choice-row{display:flex;gap:8px;flex-wrap:wrap;}
  .choice{
    padding:9px 14px;border-radius:20px;border:1px solid var(--line);background:var(--panel);
    color:var(--muted);font-size:13px;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;
  }
  .choice.active{background:var(--teal);border-color:var(--teal);color:#0E141B;font-weight:600;}

  .custom-words{display:flex;gap:10px;margin-top:12px;}

  .error-box{
    background:rgba(156,43,34,.15);border:1px solid var(--red);color:#E9B3AD;
    padding:11px 13px;border-radius:8px;font-size:13px;margin-top:14px;
  }

  .btn{
    display:block;width:100%;text-align:center;padding:16px;border-radius:9px;border:none;
    font-family:'IBM Plex Mono',monospace;letter-spacing:.06em;font-size:14px;font-weight:600;
    text-transform:uppercase;cursor:pointer;
  }
  .btn-primary{background:var(--teal);color:#0E141B;}
  .btn-primary:disabled{background:var(--panel-2);color:var(--muted);}
  .btn-secondary{background:transparent;border:1px solid var(--line);color:var(--text);}
  .btn-danger{background:var(--red);color:#F3E3E0;}
  .btn-row{display:flex;gap:10px;margin-top:10px;}
  .btn-row .btn{flex:1;}

  /* Game screens */
  .case-file{
    font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--muted);letter-spacing:.12em;
  }
  .pass-instruction{
    text-align:center;margin:30px 0 10px;
  }
  .pass-instruction .to{
    font-family:'Special Elite',monospace;font-size:22px;color:var(--text);margin:6px 0;
  }
  .pass-instruction .hint{color:var(--muted);font-size:13px;}

  .dossier-card{
    position:relative;margin:26px auto;width:100%;max-width:340px;height:220px;
    border-radius:10px;perspective:800px;
  }
  .dossier-cover{
    position:absolute;inset:0;border-radius:10px;background:var(--panel);
    border:1px solid var(--line);display:flex;align-items:center;justify-content:center;
    flex-direction:column;gap:10px;cursor:pointer;user-select:none;transition:opacity .18s ease;
  }
  .dossier-cover .stamp{
    font-family:'Special Elite',monospace;color:var(--red);border:3px solid var(--red);
    padding:6px 16px;border-radius:4px;font-size:14px;letter-spacing:.15em;transform:rotate(-6deg);
    opacity:.85;
  }
  .dossier-cover .cta{
    font-family:'IBM Plex Mono',monospace;font-size:11.5px;letter-spacing:.14em;color:var(--muted);
    text-transform:uppercase;
  }
  .dossier-face{
    position:absolute;inset:0;border-radius:10px;background:var(--paper);color:#231C12;
    display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;
    padding:20px;text-align:center;
    background-image:repeating-linear-gradient(0deg, transparent 0 27px, var(--paper-line) 27px 28px);
  }
  .dossier-face .label{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.14em;color:#6b6247;text-transform:uppercase;}
  .dossier-face .word{font-family:'Special Elite',monospace;font-size:30px;margin:6px 0;word-break:break-word;}
  .dossier-face .role-extra{font-size:12.5px;color:#6b6247;max-width:260px;line-height:1.5;}
  .dossier-cover.hidden{display:none;}
  .dossier-face.hidden{display:none;}

  .seen-note{text-align:center;color:var(--muted);font-size:12px;margin-top:14px;font-family:'IBM Plex Mono',monospace;}

  .grid-players{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px;}
  .player-tile{
    background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:14px 10px;
    text-align:center;cursor:pointer;font-size:14.5px;font-weight:600;
  }
  .player-tile.selected{border-color:var(--teal);background:rgba(62,156,143,.15);color:var(--teal);}
  .player-tile.eliminated{opacity:.35;text-decoration:line-through;cursor:default;}

  .round-banner{
    text-align:center;padding:10px 0 4px;
  }
  .round-banner .n{font-family:'Special Elite',monospace;font-size:19px;}

  .speak-order{list-style:none;padding:0;margin:14px 0 0;display:flex;flex-direction:column;gap:6px;}
  .speak-order li{
    display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--line);
    padding:10px 12px;border-radius:7px;font-size:14px;
  }
  .speak-order li .n{font-family:'IBM Plex Mono',monospace;color:var(--muted);width:20px;}

  .result-reveal{text-align:center;margin:24px 0;}
  .result-reveal .stamp-big{
    display:inline-block;font-family:'Special Elite',monospace;color:var(--red-bright);
    border:3px solid var(--red-bright);padding:10px 22px;border-radius:6px;letter-spacing:.14em;
    transform:rotate(-4deg);font-size:18px;margin-bottom:16px;
  }
  .result-reveal .who{font-size:17px;margin:4px 0;}
  .result-reveal .role-tag{
    font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--muted);margin-top:6px;
  }
  .result-reveal .word-was{font-family:'Special Elite',monospace;font-size:20px;color:var(--text);margin-top:10px;}

  .winner-banner{
    text-align:center;padding:30px 10px;border:1px solid var(--line);border-radius:10px;
    background:var(--panel);margin:20px 0;
  }
  .winner-banner .big{font-family:'Special Elite',monospace;font-size:26px;color:var(--teal);margin-bottom:8px;}
  .winner-banner .sub{color:var(--muted);font-size:13px;}

  .role-list{list-style:none;margin:18px 0 0;padding:0;display:flex;flex-direction:column;gap:8px;}
  .role-list li{
    background:var(--panel);border:1px solid var(--line);border-radius:7px;padding:10px 13px;
    display:flex;justify-content:space-between;align-items:center;font-size:13.5px;gap:10px;
  }
  .role-list .rn{font-weight:600;}
  .role-list .rr{font-family:'IBM Plex Mono',monospace;color:var(--muted);font-size:11.5px;text-align:right;}

  textarea{width:100%;background:var(--panel);border:1px solid var(--line);color:var(--text);border-radius:7px;padding:12px;font-family:'IBM Plex Mono',monospace;font-size:16px;margin-top:14px;}

  .footer-note{text-align:center;color:var(--muted);font-size:11px;margin-top:30px;font-family:'IBM Plex Mono',monospace;letter-spacing:.05em;}
</style>
</head>

/* ---------------------------------------------------------
   ÉTAT
--------------------------------------------------------- */
let setup = {
  count: 6,
  names: ["","","","","",""],
  undercoverCount: 1,
  mrWhite: false,
  detective: false,
  jester: false,
  lovers: false,
  protector: false,
  avenger: false,
  wordSource: "random", // "random" | "custom"
  customCivil: "",
  customUndercover: "",
};

let game = null; // objet de partie une fois lancée
let screen = "setup"; // "setup" | "game"

/* ---------------------------------------------------------
   UTILITAIRES
--------------------------------------------------------- */
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
function normalize(str){
  return (str||"").toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
}
function el(html){
  const t = document.createElement('template');
  t.innerHTML = html.trim();
  return t.content.firstChild;
}
function render(){
  const app = document.getElementById('app');
  app.innerHTML = "";
  app.appendChild(screen === "setup" ? renderSetup() : renderGame());
}

/* ---------------------------------------------------------
   ÉCRAN DE CONFIGURATION
--------------------------------------------------------- */
function maxUndercover(){
  const base = setup.count - (setup.mrWhite?1:0) - (setup.detective?1:0) - (setup.jester?1:0) - (setup.protector?1:0) - (setup.avenger?1:0) - 1;
  return Math.max(1, base);
}

function validateSetup(){
  const N = setup.count;
  if(N < 3) return "Il faut au moins 3 joueurs.";
  if(N > 20) return "20 joueurs maximum.";
  const specialNeeded = (setup.detective?1:0) + (setup.jester?1:0) + (setup.protector?1:0) + (setup.avenger?1:0);
  const civilCount = N - setup.undercoverCount - (setup.mrWhite?1:0);
  if(setup.undercoverCount < 1) return "Il faut au moins 1 undercover.";
  if(civilCount < specialNeeded + 1) return "Pas assez de civils pour ce nombre d'undercover et de rôles spéciaux. Réduisez les undercover ou désactivez un rôle spécial.";
  if(setup.wordSource === "custom"){
    const a = setup.customCivil.trim(), b = setup.customUndercover.trim();
    if(!a || !b) return "Entrez les deux mots du dossier personnalisé.";
    if(normalize(a) === normalize(b)) return "Les deux mots personnalisés doivent être différents.";
  }
  return null;
}

function renderSetup(){

/* ---------------------------------------------------------
   LANCEMENT DE PARTIE
--------------------------------------------------------- */
function startGame(){
  const N = setup.count;
  const players = [];
  for(let i=0;i<N;i++){
    players.push({
      id:i,
      name: (setup.names[i]||"").trim() || `Joueur ${i+1}`,
      wordRole: null,
      special: null,
      word: null,
      alive: true,
      hasSeen: false,
      detectiveDone: false,
      detectiveResult: null,
      loverId: null,
      avengeUsed: false,
    });
  }

  // construire les rôles
  let roles = [];
  if(setup.mrWhite) roles.push('mrwhite');
  for(let i=0;i<setup.undercoverCount;i++) roles.push('undercover');
  const civilSlots = N - roles.length;
  let specials = [];
  if(setup.detective) specials.push('detective');
  if(setup.jester) specials.push('jester');
  if(setup.protector) specials.push('protector');
  if(setup.avenger) specials.push('avenger');
  for(let i=0;i<civilSlots;i++) roles.push('civil');

  roles = shuffle(roles);
  players.forEach((p,i)=>{ p.wordRole = roles[i]; });

  // assigner les rôles spéciaux parmi les civils
  const civilPlayers = shuffle(players.filter(p=>p.wordRole==='civil'));
  specials.forEach((s,i)=>{ if(civilPlayers[i]) civilPlayers[i].special = s; });

  // amoureux : deux joueurs au hasard, tous camps confondus
  if(setup.lovers && players.length >= 2){
    const pair = shuffle(players.slice(0,players.length)).slice(0,2);
    pair[0].loverId = pair[1].id;
    pair[1].loverId = pair[0].id;
  }

  // mots
  let civilWord, ucWord;
  if(setup.wordSource === 'custom'){
    civilWord = setup.customCivil.trim();
    ucWord = setup.customUndercover.trim();
  } else {
    const pair = WORD_PAIRS[Math.floor(Math.random()*WORD_PAIRS.length)];
    civilWord = pair[0]; ucWord = pair[1];
  }
  players.forEach(p=>{
    if(p.wordRole==='civil') p.word = civilWord;
    else if(p.wordRole==='undercover') p.word = ucWord;
    else p.word = null;
  });

  game = {
    players,
    civilWord, ucWord,
    round: 1,
    phase: 'reveal',
    revealIndex: 0,
    revealCurrentShown: false,
    pendingDetectivePick: false,
    votingOrder: [],
    votingIndex: 0,
    votes: {},
    lastEliminatedIds: [],
    mrWhiteGuessed: false,
    tieMessage: null,
    protectedId: null,
    protectedName: null,
    pendingAvengerId: null,
    avengerKillIds: [],
    winner: null,
  };
  screen = 'game';
  render();
}

/* ---------------------------------------------------------
   ÉCRAN DE JEU — DISPATCH
--------------------------------------------------------- */
function renderGame(){
  const wrap = el(`<div></div>`);
  wrap.appendChild(el(`
    <div class="masthead">
      <div class="eyebrow">Dossier confidentiel</div>
      <h1 class="title" style="font-size:22px;">SOUS COUVERTURE</h1>
      <p class="subtitle">Manche ${game.round} · ${game.players.filter(p=>p.alive).length} agents en jeu</p>
    </div>
  `));
  const content = el(`<div class="content"></div>`);

  switch(game.phase){
    case 'reveal': content.appendChild(renderReveal()); break;
    case 'detective-peek': content.appendChild(renderDetectivePeek()); break;
    case 'discussion': content.appendChild(renderDiscussion()); break;
    case 'protect-pick': content.appendChild(renderProtectPick()); break;
    case 'voting': content.appendChild(renderVoting()); break;
    case 'tie': content.appendChild(renderTie()); break;
    case 'protected': content.appendChild(renderProtected()); break;
    case 'result': content.appendChild(renderResult()); break;
    case 'avenger-pick': content.appendChild(renderAvengerPick()); break;
    case 'avenger-result': content.appendChild(renderAvengerResult()); break;
    case 'mrwhite-guess': content.appendChild(renderMrWhiteGuess()); break;
    case 'gameover': content.appendChild(renderGameOver()); break;
  }
  wrap.appendChild(content);
  return wrap;
}

/* ---- Révélation des rôles ---- */

  } else {
    const roleTag = p.wordRole === 'undercover' ? "UNDERCOVER" : "CIVIL";
    extra = `<div class="label">Votre mot</div><div class="word">${p.word}</div><div class="role-extra">${p.wordRole==='undercover' ? "Votre mot diffère de celui de la majorité. Fondez-vous dans la masse." : "Vous partagez ce mot avec les autres civils."}</div>`;
    if(p.special === 'detective'){
      extra += `<div class="role-extra" style="margin-top:8px;color:${'#8a5a1a'}"><strong>Vous êtes aussi le Détective.</strong> Après cette carte, vous choisirez un joueur à espionner.</div>`;
    }
    if(p.special === 'jester'){
      extra += `<div class="role-extra" style="margin-top:8px;"><strong>Vous êtes aussi le Bouffon.</strong> Vous gagnez seul si le groupe vous élimine au vote.</div>`;
    }
    if(p.special === 'protector'){
      extra += `<div class="role-extra" style="margin-top:8px;"><strong>Vous êtes aussi le Garde du corps.</strong> Chaque tour, avant le vote, vous choisirez en secret un joueur à protéger.</div>`;
    }
    if(p.special === 'avenger'){
      extra += `<div class="role-extra" style="margin-top:8px;"><strong>Vous êtes aussi le Vengeur.</strong> Si vous êtes éliminé, vous désignerez aussitôt un autre joueur à emmener avec vous.</div>`;
    }
  }
  if(p.loverId !== null){
    const partner = game.players.find(pl=>pl.id===p.loverId);
    extra += `<div class="role-extra" style="margin-top:8px;"><strong>Vous êtes amoureux de ${partner.name}.</strong> Si l'un de vous est éliminé, l'autre l'est aussi. Si vous restez tous les deux seuls en vie, vous gagnez ensemble, peu importe vos camps.</div>`;
  }

  const card = el(`
    <div class="dossier-card">
      <div class="dossier-cover">
        <div class="stamp">DOSSIER</div>
        <div class="cta">Maintenir pour révéler</div>
      </div>
      <div class="dossier-face hidden">${extra}</div>
    </div>
  `);
  const cover = card.querySelector('.dossier-cover');
  const face = card.querySelector('.dossier-face');
  const show = ()=>{ cover.classList.add('hidden'); face.classList.remove('hidden'); p.hasSeen = true; updateNextBtn(); };
  const hide = ()=>{ cover.classList.remove('hidden'); face.classList.add('hidden'); };
  cover.addEventListener('pointerdown', show);
  cover.addEventListener('pointerup', hide);
  cover.addEventListener('pointerleave', hide);
  face.addEventListener('pointerup', hide);
  face.addEventListener('pointerleave', hide);
  box.appendChild(card);

  box.appendChild(el(`<div class="seen-note" id="seen-note">${p.hasSeen ? "Rôle consulté." : "Maintenez la carte appuyée pour lire votre rôle."}</div>`));

  const nextBtn = el(`<button class="btn btn-primary" id="next-reveal-btn" ${p.hasSeen?'':'disabled'}>J'ai vu, joueur suivant</button>`);
  nextBtn.addEventListener('click', ()=>{
    if(p.special === 'detective' && !p.detectiveDone){
      game.phase = 'detective-peek';
      game.pendingDetectivePick = p.id;
    } else {
      game.revealIndex++;
      if(game.revealIndex >= game.players.length){
        game.phase = 'discussion';
      }
    }
    render();
  });
  box.appendChild(nextBtn);

  function updateNextBtn(){
    const b = document.getElementById('next-reveal-btn');
    const n = document.getElementById('seen-note');
    if(b) b.disabled = false;
    if(n) n.textContent = "Rôle consulté.";
  }

  return box;
}

      const tile = el(`<div class="player-tile">${p.name}</div>`);

        const result = p.wordRole === 'civil' ? 'Civil' : 'Suspect';

/* ---- Discussion ---- */
function renderDiscussion(){
  const box = el(`<div></div>`);
  box.appendChild(el(`
    <section class="block">
      <h2 class="block-title">Tour de parole</h2>
      <p class="block-desc">Chacun décrit son mot à voix haute, sans le dire directement. Un tour, dans l'ordre ci-dessous, puis on vote.</p>

/* ---- Garde du corps : choix de la protection ---- */
function renderProtectPick(){
  const protector = game.players.find(p=>p.alive && p.special==='protector');
  const box = el(`<div></div>`);
  box.appendChild(el(`
    <div class="pass-instruction">
      <div class="eyebrow">Passez le téléphone à</div>
      <div class="to">${protector.name}</div>
      <div class="hint">Garde du corps — qui protégez-vous ce tour ?</div>
    </div>
  `));
  const grid = el(`<div class="grid-players"></div>`);
  let selected = null;
  game.players.filter(p=>p.alive).forEach(p=>{
    const tile = el(`<div class="player-tile">${p.name}${p.id===protector.id ? " (vous)" : ""}</div>`);
    tile.addEventListener('click', ()=>{
      grid.querySelectorAll('.player-tile').forEach(t=>t.classList.remove('selected'));
      tile.classList.add('selected');
      selected = p.id;
      confirmBtn.disabled = false;
    });
    grid.appendChild(tile);
  });
  box.appendChild(grid);
  const confirmBtn = el(`<button class="btn btn-primary" style="margin-top:16px;" disabled>Confirmer la protection</button>`);
  confirmBtn.addEventListener('click', ()=>{
    game.protectedId = selected;
    game.votingOrder = game.players.filter(p=>p.alive).map(p=>p.id);
    game.votingIndex = 0;
    game.votes = {};
    game.phase = 'voting';
    render();
  });

  return box;

/* ---- Vote ---- */
function renderVoting(){
  const voterId = game.votingOrder[game.votingIndex];
  const voter = game.players.find(p=>p.id===voterId);
  const box = el(`<div></div>`);
  box.appendChild(el(`
    <div class="pass-instruction">
      <div class="eyebrow">Passez le téléphone à</div>
      <div class="to">${voter.name}</div>
      <div class="hint">Qui soupçonnez-vous ?</div>
    </div>
  `));
  const grid = el(`<div class="grid-players"></div>`);
  let selected = null;
  game.players.filter(p=>p.alive && p.id!==voter.id).forEach(p=>{
    const tile = el(`<div class="player-tile">${p.name}</div>`);
    tile.addEventListener('click', ()=>{
      grid.querySelectorAll('.player-tile').forEach(t=>t.classList.remove('selected'));
      tile.classList.add('selected');
      selected = p.id;
      confirmBtn.disabled = false;
    });
    grid.appendChild(tile);
  });
  box.appendChild(grid);

  const confirmBtn = el(`<button class="btn btn-primary" style="margin-top:16px;" disabled>Confirmer mon vote</button>`);
  confirmBtn.addEventListener('click', ()=>{
    game.votes[voter.id] = selected;
    game.votingIndex++;
    if(game.votingIndex >= game.votingOrder.length){
      tallyVotes();
    }
    render();
  });
  box.appendChild(confirmBtn);
  return box;
}

function eliminateWithGrief(id){
  const ids = [id];
  const pl = game.players.find(p=>p.id===id);
  pl.alive = false;
  if(pl.loverId !== null){
    const partner = game.players.find(p=>p.id===pl.loverId);
    if(partner && partner.alive){
      partner.alive = false;
      ids.push(partner.id);
    }
  }
  return ids;
}

function tallyVotes(){
  const counts = {};
  Object.values(game.votes).forEach(targetId=>{
    counts[targetId] = (counts[targetId]||0)+1;
  });
  let max = 0;
  Object.values(counts).forEach(c=>{ if(c>max) max=c; });
  const topIds = Object.keys(counts).filter(id=>counts[id]===max).map(Number);
  if(topIds.length > 1){
    game.tieMessage = topIds.map(id=>game.players.find(p=>p.id===id).name).join(" et ");
    game.phase = 'tie';
  } else if(game.protectedId !== null && topIds[0] === game.protectedId){
    game.protectedName = game.players.find(p=>p.id===topIds[0]).name;
    game.phase = 'protected';
  } else {
    game.lastEliminatedIds = eliminateWithGrief(topIds[0]);
    game.phase = 'result';
  }
}

function renderTie(){
  const box = el(`<div></div>`);
  box.appendChild(el(`
    <div class="winner-banner">
      <div class="big" style="font-size:19px;">Égalité</div>
      <div class="sub">${game.tieMessage} sont à égalité. Personne n'est éliminé ce tour.</div>
    </div>
  `));
  const btn = el(`<button class="btn btn-primary">Nouveau tour de parole</button>`);
  btn.addEventListener('click', ()=>{ game.round++; game.protectedId=null; game.phase='discussion'; render(); });
  box.appendChild(btn);
  return box;
}

function renderProtected(){
  const box = el(`<div></div>`);
  box.appendChild(el(`
    <div class="winner-banner">
      <div class="big" style="font-size:19px;">Protection réussie</div>
      <div class="sub">${game.protectedName} était le plus visé par le vote, mais le Garde du corps veillait. Personne n'est éliminé ce tour.</div>
    </div>
  `));
  const btn = el(`<button class="btn btn-primary">Nouveau tour de parole</button>`);
  btn.addEventListener('click', ()=>{ game.round++; game.protectedId=null; game.phase='discussion'; render(); });
  box.appendChild(btn);
  return box;
}

/* ---- Résultat de l'élimination ---- */
function renderResult(){
  const ids = game.lastEliminatedIds;
  const p = game.players.find(pl=>pl.id===ids[0]);
  const grief = ids[1] !== undefined ? game.players.find(pl=>pl.id===ids[1]) : null;
  const box = el(`<div></div>`);
  const roleName = ROLE_LABEL[p.wordRole] + (p.special ? ` · ${SPECIAL_LABEL[p.special]}` : "");
  box.appendChild(el(`
    <div class="result-reveal">
      <div class="stamp-big">ÉLIMINÉ</div>
      <div class="who">${p.name}</div>
      <div class="role-tag">${roleName}</div>
      ${p.word ? `<div class="word-was">« ${p.word} »</div>` : `<div class="word-was">Aucun mot</div>`}
    </div>
  `));
  if(grief){
    const griefRole = ROLE_LABEL[grief.wordRole] + (grief.special ? ` · ${SPECIAL_LABEL[grief.special]}` : "");
    box.appendChild(el(`
      <div class="result-reveal">
        <div class="stamp-big" style="border-color:var(--muted);color:var(--muted);">MORT DE CHAGRIN</div>
        <div class="who">${grief.name}</div>
        <div class="role-tag">${griefRole}</div>
        ${grief.word ? `<div class="word-was">« ${grief.word} »</div>` : `<div class="word-was">Aucun mot</div>`}
      </div>
    `));
  }

  const btn = el(`<button class="btn btn-primary">Continuer</button>`);
  btn.addEventListener('click', ()=>{
    const eliminatedNow = ids.map(id=>game.players.find(pl=>pl.id===id));
    handleEliminationContinuation(eliminatedNow);
  });
  box.appendChild(btn);
  return box;
}

/* ---- Vengeur : choix de la cible ---- */
function renderAvengerPick(){
  const avenger = game.players.find(p=>p.id===game.pendingAvengerId);
  const box = el(`<div></div>`);
  box.appendChild(el(`
    <div class="pass-instruction">
      <div class="eyebrow">${avenger.name} — Vengeur</div>
      <div class="to" style="font-size:18px;">Qui emmenez-vous avec vous ?</div>
      <div class="hint">Vous venez d'être éliminé. Choisissez une cible.</div>
    </div>
  `));
  const grid = el(`<div class="grid-players"></div>`);
  game.players.filter(p=>p.alive).forEach(p=>{
    const tile = el(`<div class="player-tile">${p.name}</div>`);
    tile.addEventListener('click', ()=>{
      game.avengerKillIds = eliminateWithGrief(p.id);
      game.phase = 'avenger-result';
      render();
    });
    grid.appendChild(tile);
  });
  box.appendChild(grid);
  return box;
}

function renderAvengerResult(){
  const ids = game.avengerKillIds;
  const p = game.players.find(pl=>pl.id===ids[0]);
  const grief = ids[1] !== undefined ? game.players.find(pl=>pl.id===ids[1]) : null;
  const box = el(`<div></div>`);
  const roleName = ROLE_LABEL[p.wordRole] + (p.special ? ` · ${SPECIAL_LABEL[p.special]}` : "");
  box.appendChild(el(`
    <div class="result-reveal">
      <div class="stamp-big">EMMENÉ PAR VENGEANCE</div>
      <div class="who">${p.name}</div>
      <div class="role-tag">${roleName}</div>
      ${p.word ? `<div class="word-was">« ${p.word} »</div>` : `<div class="word-was">Aucun mot</div>`}
    </div>
  `));
  if(grief){
    const griefRole = ROLE_LABEL[grief.wordRole] + (grief.special ? ` · ${SPECIAL_LABEL[grief.special]}` : "");
    box.appendChild(el(`
      <div class="result-reveal">
        <div class="stamp-big" style="border-color:var(--muted);color:var(--muted);">MORT DE CHAGRIN</div>
        <div class="who">${grief.name}</div>
        <div class="role-tag">${griefRole}</div>
        ${grief.word ? `<div class="word-was">« ${grief.word} »</div>` : `<div class="word-was">Aucun mot</div>`}
      </div>
    `));
  }
  const btn = el(`<button class="btn btn-primary">Continuer</button>`);
  btn.addEventListener('click', ()=>{
    const eliminatedNow = ids.map(id=>game.players.find(pl=>pl.id===id));
    handleEliminationContinuation(eliminatedNow);
  });
  box.appendChild(btn);
  return box;
}

/* ---- Suite commune après toute élimination ---- */
function handleEliminationContinuation(eliminatedNow){
  const jesterOut = eliminatedNow.find(pl=>pl.special === 'jester');
  if(jesterOut){
    game.winner = 'jester';
    game.phase = 'gameover';
    render();
    return;
  }
  const avengerOut = eliminatedNow.find(pl=>pl.special === 'avenger' && !pl.avengeUsed);
  const aliveOthers = game.players.filter(pl=>pl.alive);
  if(avengerOut && aliveOthers.length > 0){
    avengerOut.avengeUsed = true;
    game.pendingAvengerId = avengerOut.id;
    game.phase = 'avenger-pick';
    render();
    return;
  }
  const stillAlive = game.players.filter(pl=>pl.alive);
  if(stillAlive.length === 2 && stillAlive[0].loverId === stillAlive[1].id){
    game.winner = 'amoureux';
    game.phase = 'gameover';
    render();
    return;
  }
  const mrWhiteOut = eliminatedNow.find(pl=>pl.wordRole === 'mrwhite');
  if(mrWhiteOut && !game.mrWhiteGuessed){
    game.phase = 'mrwhite-guess';
    render();
    return;
  }
  resolveWinCondition();
  render();
}

function resolveWinCondition(){
  const alive = game.players.filter(p=>p.alive);
  const threat = alive.filter(p=>p.wordRole==='undercover'||p.wordRole==='mrwhite').length;
  const civilSide = alive.filter(p=>p.wordRole==='civil').length;
  if(threat === 0){
    const hasMrWhite = game.players.some(p=>p.wordRole==='mrwhite');
    if(hasMrWhite && !game.mrWhiteGuessed){
      // Dernière chance : Mr. White devine le mot des civils avant que la victoire soit actée.
      game.phase = 'mrwhite-guess';
    } else {
      game.winner = 'civils'; game.phase = 'gameover';
    }
  } else if(threat >= civilSide){
    game.winner = 'undercover'; game.phase = 'gameover';
  } else {
    game.round++; game.phase = 'discussion';
  }
}

/* ---- Devinette de Mr. White (dès son élimination) ---- */
function renderMrWhiteGuess(){
  const mw = game.players.find(p=>p.wordRole==='mrwhite');
  const box = el(`<div></div>`);
  box.appendChild(el(`
    <div class="pass-instruction">
      <div class="eyebrow">Passez le téléphone à</div>
      <div class="to">${mw.name}</div>
      <div class="hint">Dernière chance avant de quitter la partie.</div>
    </div>
  `));
  box.appendChild(el(`
    <section class="block">
      <h2 class="block-title">La carte de Mr. White</h2>
      <p class="block-desc">Vous n'aviez aucun mot. Devinez le mot des civils : si vous trouvez, votre camp gagne quand même.</p>
      <textarea id="guess-input" rows="1" placeholder="Votre proposition..."></textarea>
    </section>
  `));
  const btn = el(`<button class="btn btn-primary">Valider la proposition</button>`);
  btn.addEventListener('click', ()=>{
    const guess = box.querySelector('#guess-input').value;
    game.mrWhiteGuessed = true;
    if(normalize(guess) === normalize(game.civilWord)){
      game.winner = 'undercover';
      game.phase = 'gameover';
    } else {
      resolveWinCondition();
    }
    render();
  });
  box.appendChild(btn);
  return box;
}

/* ---- Fin de partie ---- */
function renderGameOver(){
  const box = el(`<div></div>`);
  const titles = {
    civils: ["Les civils gagnent","L'infiltré a été démasqué à temps."],
    undercover: ["Les undercover gagnent","Ils ont survécu jusqu'à égaler les civils."],
    jester: ["Le Bouffon gagne","Il voulait être éliminé — mission accomplie."],
    amoureux: ["Les Amoureux gagnent","Ils sont restés seuls en vie, envers et contre tous les camps."],
  };
  const [big, sub] = titles[game.winner];
  box.appendChild(el(`
    <div class="winner-banner">
      <div class="big">${big}</div>
      <div class="sub">${sub}</div>
    </div>
  `));
  box.appendChild(el(`<h2 class="block-title">Dossier final</h2>`));
  const list = el(`<ul class="role-list"></ul>`);
  game.players.forEach(p=>{
    let role = ROLE_LABEL[p.wordRole] + (p.special ? ` · ${SPECIAL_LABEL[p.special]}` : "");
    if(p.loverId !== null) role += ` · Amoureux de ${game.players.find(pl=>pl.id===p.loverId).name}`;
    list.appendChild(el(`
      <li>
        <span class="rn">${p.name}${p.alive?"":" (éliminé)"}</span>
        <span class="rr">${role}${p.word?(" — "+p.word):""}</span>
      </li>
    `));
  });
  box.appendChild(list);

  const row = el(`<div class="btn-row"></div>`);
  const replay = el(`<button class="btn btn-primary">Rejouer (mêmes agents)</button>`);
  replay.addEventListener('click', ()=>{ startGame(); });
  const reset = el(`<button class="btn btn-secondary">Nouvelle configuration</button>`);
  reset.addEventListener('click', ()=>{ screen='setup'; render(); });
  row.appendChild(replay); row.appendChild(reset);
  box.appendChild(row);
  return box;
}

/* ---------------------------------------------------------
   DÉMARRAGE
--------------------------------------------------------- */
render();
</script>
